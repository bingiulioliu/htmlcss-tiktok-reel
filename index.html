<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page debug">
    <video src="assets/video/coder.mp4" autoplay muted loop class="bg-video"></video>

    <!-- Header -->
    <header class="reel-header">
      <!-- Play + 3 pagine + Cerca -->
      <div>
        <button><i class="bi bi-play-btn"></i></button>
        <!--Esplore Seguiti Per te-->
        <nav>
          <button class="nav-bar">Esplora</button>
          <button class="nav-bar">Seguiti</button>
          <button class="nav-bar">Per te</button>
        </nav>
        <button><i class="bi bi-search"></i></button>
      </div>

    </header>

    <!-- Sidebar -->
    <!--Numeri con ::after o posizionamento span?-->
    <div class="sidebar">
      <nav>
        <button><img src="./assets/img/boolean_logo.png" alt="Boolean Tik Tok Logo"></button>
        <button><i class="bi bi-suit-heart-fill"></i></button>
        <button><i class="bi bi-chat-dots-fill"></i></button>
        <button><i class="bi bi-bookmark-fill"></i></button>
        <button><i class="bi bi-sign-turn-slight-right-fill"></i></button>
      </nav>
    </div>

    <!-- Footer -->
    <footer>
      <div>

      </div>
    </footer>
  </div>

</body>

</html>
